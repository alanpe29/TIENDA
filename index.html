<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ALN FLUX STORE | Streaming Premium</title>
    <style>
        :root {
            --morado: #6200ea; --cian: #00e5ff; --fondo: #050505;
            --tarjeta: #111111; --verde: #25d366; --rojo: #ff4444; --naranja: #ff9800; --oro: #ffd700;
            --gris-oscuro: #333;
        }
        body { margin: 0; padding: 0; background-color: var(--fondo); background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px); background-size: 550px 550px, 350px 350px, 250px 250px; background-position: 0 0, 40px 60px, 130px 270px; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .status-top { width: 100%; padding: 8px 0; text-align: center; font-weight: bold; font-size: 0.8rem; background: rgba(37, 211, 102, 0.1); color: var(--verde); border-bottom: 1px solid var(--verde); }
        .last-update { font-size: 0.6rem; opacity: 0.6; display: block; font-weight: normal; margin-top: 2px; }
        header { width: 100%; background: linear-gradient(180deg, #100020 0%, var(--fondo) 100%); padding: 40px 0; text-align: center; border-bottom: 1px solid var(--morado); }
        header h1 { margin: 0; font-size: 2.3rem; letter-spacing: 5px; text-transform: uppercase; color: white; display: inline-block;}
        header h1 span { color: var(--cian); animation: glitchNeon 8s infinite; }
        @keyframes glitchNeon { 0%, 100% { text-shadow: 0 0 10px var(--cian), 0 0 20px var(--cian); } 92% { text-shadow: 0 0 10px var(--cian), 0 0 20px var(--cian); opacity: 1; } 93% { text-shadow: 0 0 5px var(--morado), 0 0 10px var(--morado); opacity: 0.8; } 95% { text-shadow: none; opacity: 0.7; } }
        .catalogo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 95%; max-width: 1100px; padding: 30px 0 50px; }
        .card { background: var(--tarjeta); border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s ease; display: flex; flex-direction: column; justify-content: center; min-height: 150px; position: relative; }
        .card:hover { border-color: var(--cian); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 229, 255, 0.15); }
        .card.combo { border: 1px solid var(--oro); background: linear-gradient(145deg, #111, #1a1600); }
        .card.sin-stock { opacity: 0.6; filter: grayscale(0.8); border-color: #444 !important; }
        .badge-agotado { position: absolute; top: 10px; right: 10px; background: var(--rojo); color: white; font-size: 0.6rem; font-weight: bold; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; }
        .card h2 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.2; }
        .precio-tag { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-add { background: var(--morado); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-add:hover:not(:disabled) { background: var(--cian); color: #000; }
        .btn-add:disabled { background: var(--gris-oscuro); cursor: not-allowed; opacity: 0.5; }
        
        /* Estilos Bóveda */
        .boveda-section { width: 90%; max-width: 450px; background: #0a0a0a; border: 2px dashed var(--morado); border-radius: 25px; padding: 30px; margin: 40px auto 120px; text-align: center; box-shadow: 0 0 20px rgba(98, 0, 234, 0.2); }
        .boveda-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; text-align: center; font-weight: bold; font-size: 1.2rem; box-sizing: border-box; margin: 15px 0; }
        
        .cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--morado); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; z-index: 1000; font-weight: bold; border: 2px solid var(--cian); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-soporte { position: fixed; bottom: 25px; left: 25px; background: var(--naranja); color: white; padding: 15px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; font-size: 0.8rem; border: 1px solid white; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 8% auto; padding: 25px; border: 1px solid var(--morado); width: 90%; max-width: 450px; border-radius: 25px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .cart-item button { background: var(--rojo); border: none; color: white; padding: 5px 10px; border-radius: 5px; }
        .form-datos { text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--cian); margin-top: 15px; }
        label { font-size: 0.7rem; color: var(--cian); display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; font-family: inherit; }
        .alerta-youtube { background: rgba(255, 68, 68, 0.2); color: #ff8888; padding: 8px; border-radius: 5px; font-size: 0.7rem; border: 1px solid var(--rojo); margin-bottom: 10px; }
        .alerta-foto { background: rgba(255, 68, 68, 0.15); border: 2px dashed var(--rojo); color: #ffcccc; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.8rem; margin-bottom: 15px; }
        .btn-finalizar { display: block; background: var(--verde); color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-top: 20px; text-align: center; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .btn-copiar { background: transparent; color: var(--cian); border: 1px solid var(--cian); padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <script>

        // ==========================================

        const WHATSAPP_NRO = "5493782518960";

        const PRODUCTOS = [
            { id: 1,  nombre: "Combo: Disney + Canva + Amazon", precio: 5000, tipo: "mail", especial: true, stock: true },

        ];

        // ==========================================
        // 🔐 BÓVEDA DE CUENTAS (EDITA AQUÍ)
        // ==========================================
        // Aquí agregarás los códigos para Disney u otras más adelante
        const BOVEDA_CUENTAS = {
            "DIS-TEST": { plataforma: "Disney Plus", mail: "disney@alnflux.com", pass: "flux2026", perfil: "3", pin: "1234" }
        };

        const REGLAS_GENERALES = `⚠️ REGLAS IMPORTANTES:
1. Usar únicamente tu perfil asignado.
2. No crear ni eliminar perfiles.
3. Solo ingresar con 1 dispositivo.
4. No modificar ninguna información de la cuenta.
5. No agregar numero de celular/ni cambiar.`;
    </script>

    <div class="status-top" id="tienda-status"></div>
    <header><h1>ALN <span>FLUX</span> STORE</h1></header>
    
    <div class="catalogo-container" id="main-grid"></div>

    <!-- SECCIÓN BÓVEDA -->
    <section class="boveda-section">
        <h3 style="color: var(--morado); margin-top: 0;">🔒 BÓVEDA DE CLIENTES</h3>
        <p style="font-size: 0.8rem; color: #888;">Ingresá el código de canje para ver tu cuenta.</p>
        <input type="text" id="input-codigo" class="boveda-input" placeholder="EJ: DIS-101">
        <button onclick="canjearCodigo()" class="btn-add">DESBLOQUEAR AHORA</button>
        <div id="resultado-canje"></div>
    </section>

    <div class="cart-float" id="cart-btn" onclick="abrirCarrito()">🛒 <span id="cart-count">0</span> PRODUCTOS</div>
    <a href="#" class="btn-soporte" onclick="abrirSoporte(); return false;">🔧 SOPORTE TÉCNICO</a>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--cian); text-align:center; margin-top:0;">MI PEDIDO</h3>
            <div id="lista-carrito"></div>
            <div id="seccion-pago-total" style="display:none;">
                <div style="font-size: 1.5rem; text-align: center; margin: 20px 0; color:white;">TOTAL: <span id="total-precio" style="color:var(--cian); font-weight:bold;">$0</span></div>
                <div style="background: #000; border: 1px dashed var(--cian); padding: 15px; border-radius: 15px; margin: 15px 0; text-align: center;">
                    <span style="color:#aaa; font-size:0.7rem;">Copiá el Alias y transferí:</span><br>
                    <b style="color:white; font-size:1.4rem;" id="alias-txt"></b><br>
                    <button class="btn-copiar" onclick="copiarAlias()" id="btn-copiar-txt">COPIAR ALIAS</button>
                </div>
                <div id="formulario-dinamico" class="form-datos"></div>
                <button onclick="enviarPedido()" class="btn-finalizar">FINALIZAR POR WHATSAPP</button>
            </div>
            <p id="carrito-vacio" style="text-align:center; color:#666; margin: 40px 0;">Carrito vacío</p>
            <p onclick="cerrarTodo()" style="margin-top:20px; color:var(--rojo); cursor:pointer; font-weight:bold; text-align:center; font-size:0.8rem;">CERRAR</p>
        </div>
    </div>

    <div id="modalSoporte" class="modal">
        <div class="modal-content" style="border-color: var(--naranja);">
            <h3 style="color:var(--naranja); text-align:center; margin-top:0;">CENTRO DE SOPORTE</h3>
            <div class="alerta-foto">🚩 <b>REQUISITO OBLIGATORIO:</b><br>Debés enviar una <b>FOTO o VIDEO</b> del error al chat.</div>
            <div class="form-datos" style="border-color:var(--naranja);">
                <label>Plataforma:</label><input type="text" id="sop-plat" placeholder="Ej: Disney">
                <label>Correo / Usuario:</label><input type="text" id="sop-user" placeholder="mail@ejemplo.com">
                <label>Contraseña:</label><input type="text" id="sop-pass" placeholder="Clave de la cuenta">
                <label>¿Qué problema tenés?:</label><textarea id="sop-prob" style="height:60px;"></textarea>
            </div>
            <button onclick="enviarSoporte()" class="btn-finalizar" style="background:var(--naranja)">ENVIAR TICKET</button>
            <p onclick="cerrarTodo()" style="margin-top:20px; color:var(--rojo); cursor:pointer; text-align:center; font-size:0.8rem;">VOLVER</p>
        </div>
    </div>

    <script>
        let carrito = [];
        const statusDiv = document.getElementById('tienda-status');
        statusDiv.innerHTML = TIENDA_ABIERTA ? `🟢 ALN FLUX STORE - DISPONIBLE <br> <span class="last-update">Stock actualizado en tiempo real</span>` : `🔴 TIENDA CERRADA TEMPORALMENTE`;
        document.getElementById('alias-txt').innerText = ALIAS_PAGO;

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            PRODUCTOS.forEach(p => {
                const enStock = p.stock !== false;
                const card = document.createElement('div');
                card.className = `card ${p.especial ? 'combo' : ''} ${!enStock ? 'sin-stock' : ''}`;
                card.innerHTML = `${!enStock ? '<div class="badge-agotado">Agotado</div>' : ''}<h2>${p.nombre}</h2><span class="precio-tag">$${p.precio.toLocaleString()}</span><button class="btn-add" ${(!TIENDA_ABIERTA || !enStock) ? 'disabled' : ''} onclick="agregarAlCarrito(${p.id})">${!enStock ? 'Sin Stock' : (TIENDA_ABIERTA ? 'Añadir al Carrito' : 'Cerrado')}</button>`;
                grid.appendChild(card);
            });
        }

        function agregarAlCarrito(id) {
            const p = PRODUCTOS.find(x => x.id === id);
            carrito.push(p);
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function abrirCarrito() {
            const modal = document.getElementById('modalCarrito');
            const lista = document.getElementById('lista-carrito');
            const vacio = document.getElementById('carrito-vacio');
            const pago = document.getElementById('seccion-pago-total');
            const form = document.getElementById('formulario-dinamico');
            lista.innerHTML = ""; form.innerHTML = "";
            let total = 0;
            if(carrito.length === 0) {
                vacio.style.display = "block"; pago.style.display = "none";
            } else {
                vacio.style.display = "none"; pago.style.display = "block";
                let rMail = false, rFull = false;
                carrito.forEach((p, i) => {
                    total += p.precio;
                    lista.innerHTML += `<div class="cart-item"><span>${p.nombre}</span><button onclick="eliminar(${i})">X</button></div>`;
                    if(p.tipo === "mail") rMail = true;
                    if(p.tipo === "full") rFull = true;
                });
                if(rMail || rFull) {
                    form.innerHTML = "<b>DATOS PARA ACTIVACIÓN:</b>";
                    if(rFull) {
                        form.innerHTML += `<div class="alerta-youtube">⚠️ Solo cuentas que no hayan tenido Premium antes.</div>`;
                        form.innerHTML += `<label>Correo YouTube:</label><input id="f-yt-user" type="email" placeholder="usuario@gmail.com"><label>Contraseña YouTube:</label><input id="f-yt-pass" type="text" placeholder="Clave de la cuenta">`;
                    }
                    if(rMail) form.innerHTML += `<label>Mail para Invitación:</label><input id="f-mail" type="email" placeholder="mail@ejemplo.com">`;
                }
                document.getElementById('total-precio').innerText = "$" + total.toLocaleString();
            }
            modal.style.display = "block";
        }

        function eliminar(index) {
            carrito.splice(index, 1);
            document.getElementById('cart-count').innerText = carrito.length;
            abrirCarrito();
        }

        function copiarAlias() {
            navigator.clipboard.writeText(ALIAS_PAGO);
            document.getElementById('btn-copiar-txt').innerText = "¡COPIADO!";
            setTimeout(() => document.getElementById('btn-copiar-txt').innerText = "COPIAR ALIAS", 2000);
        }

        function enviarPedido() {
            let listado = "";
            let subtotal = 0;
            let tieneMail = false, tieneFull = false;
            carrito.forEach((p, index) => {
                listado += `${index + 1}) ${p.nombre}\n`;
                subtotal += p.precio;
                if(p.tipo === "mail") tieneMail = true;
                if(p.tipo === "full") tieneFull = true;
            });
            const m = document.getElementById('f-mail')?.value;
            const yu = document.getElementById('f-yt-user')?.value;
            const yp = document.getElementById('f-yt-pass')?.value;
            const ahora = new Date();
            const fechaTxt = ahora.toLocaleDateString('es-AR') + " - " + ahora.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'});

            let msg = `Hola ALN FLUX STORE 👋\nQuiero comprar lo siguiente:\n\n${listado}💰 Subtotal: $${subtotal.toLocaleString()}\n💰 Total:$${subtotal.toLocaleString()}\n💳 Pago: Transferencia\n🔑 Alias: ${ALIAS_PAGO}\n🏦 CVU: ${CVU_PAGO}\n\n🕒 *Fecha y Hora:* ${fechaTxt}\n`;
            if(m || yu) {
                msg += `\n--------------------------\n📩 *DATOS PARA ACTIVACIÓN:*\n`;
                if(yu) msg += `- YT User: ${yu}\n- YT Pass: ${yp}\n`;
                if(m) msg += `- Mail: ${m}\n`;
            }
            msg += `\n📦 *Luego envío el comprobante + el carrito por WhatsApp.*`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function abrirSoporte() { document.getElementById('modalSoporte').style.display = "block"; }
        function cerrarTodo() { document.getElementById('modalCarrito').style.display = "none"; document.getElementById('modalSoporte').style.display = "none"; }
        
        function enviarSoporte() {
            const plat = document.getElementById('sop-plat').value;
            const user = document.getElementById('sop-user').value;
            const pass = document.getElementById('sop-pass').value;
            const prob = document.getElementById('sop-prob').value;
            const ahora = new Date();
            const fechaTxt = ahora.toLocaleDateString('es-AR') + " - " + ahora.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'});
            let msg = `🚨 *TICKET DE SOPORTE*\n🕒 *Fecha y Hora:* ${fechaTxt}\n\n• Plataforma: ${plat}\n• User: ${user}\n• Pass: ${pass}\n• Problema: ${prob}\n\n*(Adjunto captura de pantalla a continuación)*`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        // LÓGICA DE BÓVEDA ACTUALIZADA
        function canjearCodigo() {
            const codInput = document.getElementById('input-codigo').value.trim().toUpperCase();
            const resultadoDiv = document.getElementById('resultado-canje');
            const cuenta = BOVEDA_CUENTAS[codInput];
            
            if (cuenta) {
                // Generar fechas
                const ahora = new Date();
                const vencimiento = new Date();
                vencimiento.setDate(ahora.getDate() + 30);
                
                const fCompra = ahora.toLocaleDateString('es-AR');
                const fVence = vencimiento.toLocaleDateString('es-AR');

                const textoCopiado = `🍿 ENTREGA DE CUENTA - ALN FLUX\n----------------------------------\n📺 Plataforma: ${cuenta.plataforma}\n📧 Correo: ${cuenta.mail}\n🔑 Clave: ${cuenta.pass}\n👤 Perfil: ${cuenta.perfil}\n📌 PIN: ${cuenta.pin}\n\n📅 Fecha Compra: ${fCompra}\n📅 Vencimiento: ${fVence}\n\n${REGLAS_GENERALES}\n----------------------------------\n¡Gracias por tu compra!`;

                resultadoDiv.innerHTML = `
                    <div style="background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cian); padding: 15px; border-radius: 15px; margin-top: 20px; text-align: left;">
                        <h4 style="color: var(--cian); margin-top: 0; text-align: center;">✅ CUENTA DESBLOQUEADA</h4>
                        <p style="font-size:0.9rem;">
                            <b>📺 Plataforma:</b> ${cuenta.plataforma}<br>
                            <b>📧 Correo:</b> ${cuenta.mail}<br>
                            <b>🔑 Clave:</b> ${cuenta.pass}<br>
                            <b>👤 Perfil:</b> ${cuenta.perfil}<br>
                            <b>📌 PIN:</b> ${cuenta.pin}<br><br>
                            <b>📅 Fecha Compra:</b> ${fCompra}<br>
                            <b>📅 Vencimiento:</b> <span style="color:var(--naranja); font-weight:bold;">${fVence}</span>
                        </p>
                        <hr style="border: 0; border-top: 1px solid #333;">
                        <p style="font-size: 0.65rem; color: #aaa; white-space: pre-line;">${REGLAS_GENERALES}</p>
                        <button onclick="copiarTextoBoveda(\`${textoCopiado.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)" class="btn-add" style="background: var(--verde); margin-top: 10px; font-size:0.7rem;">📋 COPIAR TODO PARA MI CLIENTE</button>
                    </div>`;
            } else {
                resultadoDiv.innerHTML = `<p style="color: var(--rojo); margin-top: 15px; font-weight: bold; font-size:0.8rem;">❌ Código inválido o expirado.</p>`;
            }
        }
        
        function copiarTextoBoveda(texto) {
            navigator.clipboard.writeText(texto.replace(/\\n/g, '\n'));
            alert("¡Todo copiado! Ya podés pegárselo a tu cliente.");
        }
        render();
    </script>
</body>
</html>
