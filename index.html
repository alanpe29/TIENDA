<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALN FLUX | Bóveda de Entrega</title>
    <style>
        :root { --morado: #6200ea; --cian: #00e5ff; --fondo: #050505; --tarjeta: #111111; --verde: #25d366; }
        body { 
            margin: 0; padding: 0; background-color: var(--fondo); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        header { width: 100%; padding: 30px 0; text-align: center; border-bottom: 1px solid var(--morado); background: linear-gradient(180deg, #100020 0%, var(--fondo) 100%); }
        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 4px; color: white; }
        header h1 span { color: var(--cian); text-shadow: 0 0 10px var(--cian); }

        .container { width: 90%; max-width: 450px; margin-top: 40px; text-align: center; }
        .instrucciones { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        
        .input-codigo {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333;
            background: #000; color: white; text-align: center; font-size: 1.2rem;
            font-weight: bold; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        .input-codigo:focus { border-color: var(--cian); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }

        .btn-revelar {
            width: 100%; background: var(--morado); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .resultado-box {
            margin-top: 30px; display: none; background: var(--tarjeta);
            border: 2px solid var(--cian); border-radius: 20px; padding: 25px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dato-row { text-align: left; margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .dato-label { font-size: 0.7rem; color: var(--cian); text-transform: uppercase; font-weight: bold; }
        .dato-valor { font-size: 1.1rem; display: block; margin-top: 4px; color: #fff; }

        .reglas-box {
            background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444;
            border-radius: 10px; padding: 12px; font-size: 0.8rem; text-align: left; margin-top: 20px; line-height: 1.4;
        }

        .btn-copiar-todo {
            width: 100%; background: var(--verde); color: black; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

    <header><h1>ALN <span>FLUX</span> BOVEDA</h1></header>

    <div class="container">
        <p class="instrucciones">Ingresa tu código de liberación para ver los datos de acceso.</p>
        
        <input type="text" id="codigo-input" class="input-codigo" placeholder="CÓDIGO DE ENTREGA" autocomplete="off">
        <button class="btn-revelar" onclick="revelarCuenta()">LIBERAR CUENTA 🔓</button>

        <div id="resultado" class="resultado-box">
            <h3 id="res-plataforma" style="margin-top:0; color:var(--cian);"></h3>
            
            <div class="dato-row">
                <span class="dato-label">Correo / Usuario</span>
                <span id="res-mail" class="dato-valor"></span>
            </div>
            
            <div class="dato-row">
                <span class="dato-label">Contraseña</span>
                <span id="res-pass" class="dato-valor"></span>
            </div>

            <div class="dato-row">
                <span class="dato-label">Perfil y PIN</span>
                <span id="res-perfil" class="dato-valor"></span>
            </div>

            <div class="reglas-box">
                <b>⚠️ REGLAS DE ORO:</b><br>
                1. Prohibido cambiar correo o contraseña.<br>
                2. No tocar perfiles ajenos.<br>
                3. Solo 1 dispositivo a la vez.<br>
                ❌ Incumplir reglas anula la garantía.
            </div>

            <button class="btn-copiar-todo" id="btn-copy">
                COPIAR DATOS Y REGLAS ✅
            </button>
        </div>
    </div>

    <script>
        const BOVEDA = {
            // --- DISNEY PLUS (CARGADAS) ---
            "ALN-DP1": { plat: "Disney Plus", mail: "sofia.mendez@semflix.net", pass: "ander5066", perf: "Perfil 1", pin: "2002" },
            "ALN-DP2": { plat: "Disney Plus", mail: "sofia.mendez@semflix.net", pass: "ander5066", perf: "Perfil 2", pin: "9910" },
            "ALN-DP3": { plat: "Disney Plus", mail: "sofia.mendez@semflix.net", pass: "ander5066", perf: "Perfil 3", pin: "4020" },
            "ALN-DP4": { plat: "Disney Plus", mail: "sofia.mendez@semflix.net", pass: "ander5066", perf: "Perfil 4", pin: "1150" },
            "ALN-DP5": { plat: "Disney Plus", mail: "sofia.mendez@semflix.net", pass: "ander5066", perf: "Perfil 5", pin: "0200" },

            // --- AMAZON PRIME (5 SLOTS) ---
            "ALN-AMZ1": { plat: "Amazon Prime", mail: "lomajoya1@outlook.com", pass: "Juanmaria1@", perf: "Perfil 02", pin: "00030" },
            "ALN-AMZ2": { plat: "Amazon Prime", mail: "", pass: "", perf: "", pin: "" },
            "ALN-AMZ3": { plat: "Amazon Prime", mail: "", pass: "", perf: "", pin: "" },
            "ALN-AMZ4": { plat: "Amazon Prime", mail: "", pass: "", perf: "", pin: "" },
            "ALN-AMZ5": { plat: "Amazon Prime", mail: "", pass: "", perf: "", pin: "" },

            // --- HBO MAX (5 SLOTS VACÍOS) ---
            "ALN-HBO1": { plat: "HBO Max", mail: "", pass: "", perf: "", pin: "" },
            "ALN-HBO2": { plat: "HBO Max", mail: "", pass: "", perf: "", pin: "" },
            "ALN-HBO3": { plat: "HBO Max", mail: "", pass: "", perf: "", pin: "" },
            "ALN-HBO4": { plat: "HBO Max", mail: "", pass: "", perf: "", pin: "" },
            "ALN-HBO5": { plat: "HBO Max", mail: "", pass: "", perf: "", pin: "" }
        };

        function revelarCuenta() {
            const cod = document.getElementById('codigo-input').value.trim().toUpperCase();
            const cuenta = BOVEDA[cod];
            const resBox = document.getElementById('resultado');

            if (cuenta && cuenta.mail !== "") {
                document.getElementById('res-plataforma').innerText = cuenta.plat;
                document.getElementById('res-mail').innerText = cuenta.mail;
                document.getElementById('res-pass').innerText = cuenta.pass;
                document.getElementById('res-perfil').innerText = `${cuenta.perf} | PIN: ${cuenta.pin}`;
                resBox.style.display = 'block';

                document.getElementById('btn-copy').onclick = function() {
                    const reglasMsg = `🍿 *TU CUENTA ALN FLUX*\n\n📺 *Servicio:* ${cuenta.plat}\n📧 *Mail:* ${cuenta.mail}\n🔑 *Pass:* ${cuenta.pass}\n👤 *Perfil:* ${cuenta.perf}\n🔢 *PIN:* ${cuenta.pin}\n\n⚠️ *REGLAS DE ORO (Sin excepción):*\n1️⃣ Prohibido cambiar el Correo o la Contraseña.\n2️⃣ Prohibido cambiar el Nombre o PIN de los perfiles.\n3️⃣ Usar ÚNICAMENTE el perfil asignado.\n4️⃣ Conectar solo 1 DISPOSITIVO a la vez.\n❌ *El incumplimiento de cualquier regla anula la garantía.*\n\n¡Gracias por elegir ALN FLUX STORE! 🎬`;
                    navigator.clipboard.writeText(reglasMsg);
                    alert("¡Datos y reglas copiados!");
                };
            } else {
                alert("Código no encontrado o slot sin stock. Contacta al soporte de ALN FLUX.");
                resBox.style.display = 'none';
            }
        }
    </script>
</body>
</html>
