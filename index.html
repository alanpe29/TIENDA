<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALN FLUX STORE | Streaming Premium</title>
    <style>
        :root {
            --morado: #6200ea; --cian: #00e5ff; --fondo: #050505;
            --tarjeta: #111111; --verde: #25d366; --rojo: #ff4444; --naranja: #ff9800;
            --neon-cyan: #00e5ff80;
        }
        body { margin: 0; padding: 0; background-color: var(--fondo); background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px); background-size: 550px 550px, 350px 350px; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .status-top { width: 100%; padding: 10px 0; text-align: center; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid; }
        .tienda-abierta { background: rgba(37, 211, 102, 0.1); color: var(--verde); border-color: var(--verde); }
        .tienda-cerrada { background: rgba(255, 68, 68, 0.1); color: var(--rojo); border-color: var(--rojo); }
        
        header { width: 100%; background: linear-gradient(180deg, #100020 0%, var(--fondo) 100%); padding: 40px 0; text-align: center; border-bottom: 1px solid var(--morado); }
        header h1 { margin: 0; font-size: 2.3rem; letter-spacing: 5px; text-transform: uppercase; color: white; }
        header h1 span { color: var(--cian); text-shadow: 0 0 15px var(--cian); }
        
        .catalogo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 95%; max-width: 1100px; padding: 30px 0 50px; }
        .card { background: var(--tarjeta); border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s ease; position: relative; min-height: 180px; display: flex; flex-direction: column; justify-content: center; }
        .card:hover { border-color: var(--cian); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 229, 255, 0.1); }
        .precio-tag { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; display: block; color: white; }
        
        .btn-info { background: transparent; color: var(--cian); border: none; font-size: 0.75rem; cursor: pointer; text-decoration: underline; margin-bottom: 15px; display: block; width: 100%; }
        .btn-add { background: var(--morado); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; margin-bottom: 8px; }
        .btn-demo { background: transparent; color: var(--cian); border: 1px solid var(--cian); padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 0.7rem; text-transform: uppercase; }

        .boveda-section { width: 95%; max-width: 450px; background: #0a0a0a; border: 2px dashed var(--morado); border-radius: 25px; padding: 30px 20px; margin: 40px auto 120px; text-align: center; }
        .boveda-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; text-align: center; font-weight: bold; font-size: 1.2rem; margin: 15px 0; outline: none; }
        
        .access-card-container { width: 100%; height: 440px; perspective: 1000px; margin-top: 20px; display: none; }
        .access-card-inner { width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; border-radius: 20px; backface-visibility: hidden; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        .card-face-front { background: var(--tarjeta); border: 2px solid var(--cian); justify-content: center; align-items: center; padding: 20px; }
        .card-face-back { background: var(--tarjeta); border: 2px solid var(--cian); transform: rotateY(180deg); justify-content: space-between; padding: 20px; }
        .rules-section { border-top: 1px dashed var(--cian); padding-top: 10px; margin-top: 10px; text-align: left; font-size: 0.6rem; color: #aaa; white-space: pre-line; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 8% auto; padding: 25px; border: 1px solid var(--morado); width: 90%; max-width: 450px; border-radius: 25px; }
        .cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--morado); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; z-index: 1000; font-weight: bold; border: 2px solid var(--cian); }
        .btn-soporte { position: fixed; bottom: 25px; left: 25px; background: var(--naranja); color: white; padding: 15px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; font-size: 0.8rem; border: 1px solid white; cursor: pointer; }
        
        .form-datos { text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--cian); margin-top: 15px; }
        label { font-size: 0.7rem; color: var(--cian); display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; font-family: inherit; }
        .btn-finalizar { display: block; background: var(--verde); color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-top: 20px; text-align: center; width: 100%; border:none; cursor:pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .cart-item button { background: var(--rojo); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>

    <script>
        let carrito = [];
        const statusDiv = document.getElementById('status-top');
        if(TIENDA_ABIERTA) { statusDiv.className = "status-top tienda-abierta"; statusDiv.innerText = "🟢 DISPONIBLE"; }
        else { statusDiv.className = "status-top tienda-cerrada"; statusDiv.innerText = "🔴 CERRADO"; }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            PRODUCTOS.forEach(p => {
                let h = `<div class="card"><h2>${p.nombre}</h2><span class="precio-tag">$${p.precio.toLocaleString()}</span><button class="btn-info" onclick="abrirInfo(${p.id})">[ Saber más ]</button><button class="btn-add" ${!TIENDA_ABIERTA?'disabled':''} onclick="agregarAlCarrito(${p.id})">${TIENDA_ABIERTA?'Añadir':'Cerrado'}</button>`;
                if(p.demo) h += `<button class="btn-demo" ${!DEMOS_HABILITADAS?'disabled':''} onclick="abrirDemo('${p.nombre}')">${DEMOS_HABILITADAS?'🎁 Probar Demo':'Demos Pausadas'}</button>`;
                h += `</div>`; grid.innerHTML += h;
            });
        }

        function abrirInfo(id) { const p = PRODUCTOS.find(x => x.id === id); document.getElementById('info-titulo').innerText = p.nombre; document.getElementById('info-cuerpo').innerText = p.desc; document.getElementById('modalInfo').style.display = "block"; }

        function canjearCodigo() {
            const cod = document.getElementById('input-codigo').value.trim().toUpperCase();
            const res = document.getElementById('resultado-canje');
            const cCont = document.getElementById('access-card-container');
            const cInner = document.getElementById('access-card-inner');
            cCont.style.display = "none"; cInner.classList.remove('is-flipped'); res.innerHTML = "";
            if(!cod) return;
            const c = BOVEDA_CUENTAS[cod];
            if(c && c.mail !== "") {
                const v = new Date(); v.setDate(v.getDate() + 30);
                document.getElementById('txt-plat').innerText = c.plataforma;
                document.getElementById('txt-mail').innerText = c.mail;
                document.getElementById('txt-pass').innerText = c.pass;
                document.getElementById('txt-perfil').innerText = c.perfil;
                document.getElementById('txt-pin').innerText = c.pin;
                document.getElementById('flip-logo').innerText = c.emoji;
                document.getElementById('flip-vence').innerText = `Vence: ${v.toLocaleDateString()}`;
                document.getElementById('txt-reglas-boveda').innerText = "⚠ REGLAS DE USO:\n" + REGLAS_TEXTO.replace("⚠ Reglas de uso:\n", "").split('\n\n')[0];
                document.getElementById('btn-copy-card').onclick = () => {
                    const txt = `🍿 ENTREGA ALN FLUX\n📺 Plat: ${c.plataforma}\n📧 Correo: ${c.mail}\n🔑 Clave: ${c.pass}\n👤 Perfil: ${c.perfil}\n📌 PIN: ${c.pin}\n\n${REGLAS_TEXTO}`;
                    navigator.clipboard.writeText(txt); alert('¡Copiado!');
                };
                cCont.style.display = "block";
            } else { res.innerHTML = `<p style="color:var(--rojo); margin-top:10px;">❌ CÓDIGO INVÁLIDO O VACÍO</p>`; }
        }

        function abrirCarrito() {
            if(!TIENDA_ABIERTA) return;
            const l = document.getElementById('lista-carrito'); const p = document.getElementById('seccion-pago'); const f = document.getElementById('form-datos');
            l.innerHTML = ""; f.innerHTML = "";
            if(carrito.length === 0) { document.getElementById('carrito-vacio').style.display="block"; p.style.display="none"; }
            else {
                document.getElementById('carrito-vacio').style.display="none"; p.style.display="block";
                let t = 0; let hYT = false; let hM = false;
                carrito.forEach((x, i) => { t += x.precio; l.innerHTML += `<div class="cart-item"><span>${x.nombre}</span><button onclick="carrito.splice(${i},1); abrirCarrito()">X</button></div>`; if(x.tipo === "full") hYT = true; if(x.tipo === "mail") hM = true; });
                document.getElementById('total-precio').innerText = "$" + t.toLocaleString();
                if(hYT) f.innerHTML += `<label>Mail YouTube:</label><input id="f-yt-u"><label>Clave YouTube:</label><input id="f-yt-p">`;
                if(hM) f.innerHTML += `<label>Mail Invitación:</label><input id="f-mail">`;
            }
            document.getElementById('modalCarrito').style.display = "block";
        }

        function validarYEnviarPedido() {
            const ytU = document.getElementById('f-yt-u')?.value.trim(); const ytP = document.getElementById('f-yt-p')?.value.trim(); const mail = document.getElementById('f-mail')?.value.trim();
            if(document.getElementById('f-yt-u') && (!ytU || !ytP)) { alert("Completa Mail y Clave de YouTube."); return; }
            if(document.getElementById('f-mail') && !mail) { alert("Completa Mail para invitación."); return; }
            let it = ""; let t = 0; carrito.forEach((x, i) => { it += `${i+1}) ${x.nombre}\n`; t += x.precio; });
            const msg = `Hola ALN FLUX STORE 👋\nQuiero comprar:\n\n${it}\n💰 Total: $${t.toLocaleString()}\n🔑 Alias: ${ALIAS_PAGO}\n👤 Titular: ${NOMBRE_PAGO}\n${ytU?'📩 YT: '+ytU+' / '+ytP+'\n':''}${mail?'📩 Mail: '+mail+'\n':''}📦 Envío comprobante.`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function abrirSoporte() { document.getElementById('modalSoporte').style.display = "block"; }

        function enviarSoporte() {
            const p = document.getElementById('sop-plat').value.trim();
            const u = document.getElementById('sop-user').value.trim();
            const s = document.getElementById('sop-pass').value.trim();
            const pr = document.getElementById('sop-prob').value.trim();
            if(!p || !u || !s || !pr) { alert("⚠️ Completa todos los campos."); return; }
            const msg = `🚨 SOPORTE\nPlat: ${p}\nUser: ${u}\nClave: ${s}\nProb: ${pr}`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function abrirDemo(n) { document.getElementById('modalDemo').style.display="block"; document.getElementById('btn-whatsapp-demo').onclick = () => window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent('Hola ALN FLUX! 👋 Solicito DEMO de '+n)}`); }
        function agregarAlCarrito(id) { if(!TIENDA_ABIERTA) return; carrito.push(PRODUCTOS.find(x => x.id === id)); document.getElementById('cart-count').innerText = carrito.length; }
        function cerrarTodo() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        render();
    </script>
</body>
</html>
