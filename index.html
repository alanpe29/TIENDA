<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALN FLUX STORE | Streaming Premium</title>
    <style>
        :root {
            --morado: #6200ea; --cian: #00e5ff; --fondo: #050505;
            --tarjeta: #111111; --verde: #25d366; --rojo: #ff4444; --naranja: #ff9800; --oro: #ffd700;
            --gris-oscuro: #333;
        }
        body { margin: 0; padding: 0; background-color: var(--fondo); background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px); background-size: 550px 550px, 350px 350px, 250px 250px; background-position: 0 0, 40px 60px, 130px 270px; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .status-top { width: 100%; padding: 10px 0; text-align: center; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid; }
        .tienda-abierta { background: rgba(37, 211, 102, 0.1); color: var(--verde); border-color: var(--verde); }
        .tienda-cerrada { background: rgba(255, 68, 68, 0.1); color: var(--rojo); border-color: var(--rojo); }
        
        header { width: 100%; background: linear-gradient(180deg, #100020 0%, var(--fondo) 100%); padding: 40px 0; text-align: center; border-bottom: 1px solid var(--morado); }
        header h1 { margin: 0; font-size: 2.3rem; letter-spacing: 5px; text-transform: uppercase; color: white; display: inline-block;}
        header h1 span { color: var(--cian); animation: glitchNeon 8s infinite; }
        @keyframes glitchNeon { 0%, 100% { text-shadow: 0 0 10px var(--cian), 0 0 20px var(--cian); } 92% { text-shadow: 0 0 10px var(--cian), 0 0 20px var(--cian); opacity: 1; } 93% { text-shadow: 0 0 5px var(--morado), 0 0 10px var(--morado); opacity: 0.8; } 95% { text-shadow: none; opacity: 0.7; } }
        
        .catalogo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 95%; max-width: 1100px; padding: 30px 0 50px; }
        .card { background: var(--tarjeta); border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s ease; display: flex; flex-direction: column; justify-content: center; min-height: 150px; position: relative; }
        .card:hover { border-color: var(--cian); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0, 229, 255, 0.15); }
        .card.combo { border: 1px solid var(--oro); background: linear-gradient(145deg, #111, #1a1600); }
        .card h2 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.2; }
        .precio-tag { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .btn-add { background: var(--morado); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-add:hover:not(:disabled) { background: var(--cian); color: #000; }
        
        .boveda-section { width: 90%; max-width: 450px; background: #0a0a0a; border: 2px dashed var(--morado); border-radius: 25px; padding: 30px; margin: 40px auto 120px; text-align: center; box-shadow: 0 0 20px rgba(98, 0, 234, 0.2); }
        .boveda-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; text-align: center; font-weight: bold; font-size: 1.2rem; box-sizing: border-box; margin: 15px 0; outline: none; }
        
        .cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--morado); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; z-index: 1000; font-weight: bold; border: 2px solid var(--cian); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-soporte { position: fixed; bottom: 25px; left: 25px; background: var(--naranja); color: white; padding: 15px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; font-size: 0.8rem; border: 1px solid white; cursor: pointer; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: #0a0a0a; margin: 8% auto; padding: 25px; border: 1px solid var(--morado); width: 90%; max-width: 450px; border-radius: 25px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .cart-item button { background: var(--rojo); border: none; color: white; padding: 5px 10px; border-radius: 5px; }
        
        .form-datos { text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--cian); margin-top: 15px; }
        label { font-size: 0.7rem; color: var(--cian); display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; font-family: inherit; }
        
        .alerta-roja { background: rgba(255, 68, 68, 0.2); color: #ff8888; padding: 10px; border-radius: 8px; font-size: 0.75rem; border: 1px solid var(--rojo); margin-bottom: 15px; text-align: center; }
        .btn-finalizar { display: block; background: var(--verde); color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-top: 20px; text-align: center; width: 100%; font-size: 1.1rem; border:none; cursor:pointer; }
    </style>
</head>
<body>

    <script>
        // ==========================================
        // ⚙️ PANEL DE CONTROL
        // ==========================================
        const TIENDA_ABIERTA = true; 
        const WHATSAPP_NRO = "5493782518960";
        const ALIAS_PAGO = "Alanpe29";

        const PRODUCTOS = [
            { id: 1,  nombre: "Combo: Disney + Canva + Amazon", precio: 5000, tipo: "mail", especial: true },
            { id: 2,  nombre: "Amazon Prime Video", precio: 2500, tipo: "directo" },
            { id: 3,  nombre: "Disney Plus", precio: 2500, tipo: "directo" },
            { id: 4,  nombre: "Max (HBO)", precio: 2000, tipo: "directo" },
            { id: 5,  nombre: "Paramount Plus", precio: 2000, tipo: "directo" },
            { id: 6,  nombre: "VIX Premium", precio: 2000, tipo: "directo" },
            { id: 7,  nombre: "Crunchyroll", precio: 2500, tipo: "directo" },
            { id: 8,  nombre: "Tidal Individual", precio: 1500, tipo: "directo" },
            { id: 9,  nombre: "Flujo TV", precio: 5500, tipo: "directo" },
            { id: 10, nombre: "YouTube Individual", precio: 2000, tipo: "full" },
            { id: 11, nombre: "YouTube Familiar", precio: 3000, tipo: "full" },
            { id: 12, nombre: "Canva Pro (1 mes)", precio: 1600, tipo: "mail" },
            { id: 13, nombre: "Canva Pro (3 meses)", precio: 3000, tipo: "mail" },
            { id: 14, nombre: "Canva Mayorista (10u)", precio: 9999, tipo: "directo" },
            { id: 15, nombre: "TV Digital N", precio: 7999, tipo: "directo" },
            { id: 16, nombre: "POWER SIGNAL", precio: 2500, tipo: "directo" }
        ];

        // 🔐 BÓVEDA ACTUALIZADA
        const BOVEDA_CUENTAS = {
            "ALN-DS448": { plataforma: "Disney Plus", mail: "daxmerlo.hu6@semprastore.xyz", pass: "mplay13mar@", perfil: "2", pin: "2121" },
            "ALN-HB531": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "1", pin: "1111" },
            "ALN-HB010": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "2", pin: "2121" },
            "ALN-HB202": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "3", pin: "1313" },
            "ALN-HB947": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "4", pin: "1141" }
        };

        const REGLAS = `⚠️ REGLAS:\n1. Usar solo tu perfil.\n2. No cambiar nada.\n3. Solo 1 dispositivo.`;
    </script>

    <div id="status-top" class="status-top"></div>
    <header><h1>ALN <span>FLUX</span> STORE</h1></header>
    
    <div class="catalogo-container" id="main-grid"></div>

    <section class="boveda-section">
        <h3 style="color: var(--morado); margin-top: 0;">🔒 BÓVEDA DE CLIENTES</h3>
        <input type="text" id="input-codigo" class="boveda-input" placeholder="INGRESA CÓDIGO">
        <button onclick="canjearCodigo()" class="btn-add">REVELAR ACCESO</button>
        <div id="resultado-canje"></div>
    </section>

    <div class="cart-float" onclick="abrirCarrito()">🛒 <span id="cart-count">0</span></div>
    <div class="btn-soporte" onclick="abrirSoporte()">🔧 SOPORTE</div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--cian); text-align:center;">MI PEDIDO</h3>
            <div id="lista-carrito"></div>
            <div id="seccion-pago" style="display:none;">
                <div style="font-size: 1.5rem; text-align: center; margin: 15px 0;">TOTAL: <span id="total-precio" style="color:var(--cian);">$0</span></div>
                <div style="background:#000; padding:10px; border-radius:10px; text-align:center; border:1px dashed var(--cian);">Alias: <b id="alias-txt"></b></div>
                <div id="form-datos" class="form-datos"></div>
                <button onclick="enviarPedido()" class="btn-finalizar">PEDIR POR WHATSAPP</button>
            </div>
            <p id="carrito-vacio" style="text-align:center; color:#555;">Carrito vacío</p>
            <p onclick="cerrarTodo()" style="text-align:center; color:var(--rojo); cursor:pointer; margin-top:20px;">CERRAR</p>
        </div>
    </div>

    <div id="modalSoporte" class="modal">
        <div class="modal-content" style="border-color: var(--naranja);">
            <h3 style="color:var(--naranja); text-align:center;">SOPORTE</h3>
            <div class="alerta-roja">🚩 REQUISITO: Enviar FOTO o VIDEO del error.</div>
            <input type="text" id="sop-plat" placeholder="Plataforma">
            <input type="text" id="sop-user" placeholder="Correo">
            <input type="text" id="sop-pass" placeholder="Clave">
            <textarea id="sop-prob" style="width:100%; margin-top:10px; height:60px;" placeholder="Problema"></textarea>
            <button onclick="enviarSoporte()" class="btn-finalizar" style="background:var(--naranja)">ENVIAR</button>
            <p onclick="cerrarTodo()" style="text-align:center; color:var(--rojo); cursor:pointer; margin-top:15px;">VOLVER</p>
        </div>
    </div>

    <script>
        let carrito = [];
        const statusDiv = document.getElementById('status-top');
        if(TIENDA_ABIERTA) { statusDiv.className = "status-top tienda-abierta"; statusDiv.innerText = "🟢 DISPONIBLE"; }
        else { statusDiv.className = "status-top tienda-cerrada"; statusDiv.innerText = "🔴 CERRADO"; }
        document.getElementById('alias-txt').innerText = ALIAS_PAGO;

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            PRODUCTOS.forEach(p => {
                grid.innerHTML += `<div class="card ${p.especial?'combo':''}"><h2>${p.nombre}</h2><span class="precio-tag">$${p.precio.toLocaleString()}</span><button class="btn-add" onclick="agregarAlCarrito(${p.id})">Añadir</button></div>`;
            });
        }

        function agregarAlCarrito(id) {
            carrito.push(PRODUCTOS.find(x => x.id === id));
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function abrirCarrito() {
            const modal = document.getElementById('modalCarrito');
            const lista = document.getElementById('lista-carrito');
            const pago = document.getElementById('seccion-pago');
            const form = document.getElementById('form-datos');
            lista.innerHTML = ""; form.innerHTML = ""; let t = 0;
            if(carrito.length === 0) { document.getElementById('carrito-vacio').style.display="block"; pago.style.display="none"; }
            else {
                document.getElementById('carrito-vacio').style.display="none"; pago.style.display="block";
                let hasYT = false, hasMail = false;
                carrito.forEach((p, i) => {
                    t += p.precio;
                    lista.innerHTML += `<div class="cart-item"><span>${p.nombre}</span><button onclick="carrito.splice(${i},1); abrirCarrito()">X</button></div>`;
                    if(p.tipo === "full") hasYT = true;
                    if(p.tipo === "mail") hasMail = true;
                });
                if(hasYT) form.innerHTML += `<div class="alerta-roja">Solo cuentas nuevas para YouTube.</div><label>Correo YouTube:</label><input id="f-yt-user"><label>Clave YouTube:</label><input id="f-yt-pass">`;
                if(hasMail) form.innerHTML += `<label>Mail Invitación:</label><input id="f-mail">`;
                document.getElementById('total-precio').innerText = "$" + t.toLocaleString();
            }
            modal.style.display = "block";
        }

        function cerrarTodo() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function enviarPedido() {
            let items = ""; let total = 0;
            let hasYT = false, hasMail = false;
            carrito.forEach((p, i) => { 
                items += `${i+1}) ${p.nombre}\n`; 
                total += p.precio; 
                if(p.tipo === "full") hasYT = true;
                if(p.tipo === "mail") hasMail = true;
            });
            
            const ytU = document.getElementById('f-yt-user')?.value;
            const ytP = document.getElementById('f-yt-pass')?.value;
            const mail = document.getElementById('f-mail')?.value;
            const fecha = new Date().toLocaleDateString() + " - " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            let msg = `Hola ALN FLUX STORE 👋\nQuiero comprar lo siguiente:\n\n${items}\n💰 Total: $${total.toLocaleString()}\n💳 Pago: Transferencia\n🔑 Alias: ${ALIAS_PAGO}\n🕒 Fecha: ${fecha}\n`;

            if(hasYT || hasMail) {
                msg += `\n📩 DATOS ACTIVACIÓN:`;
                if(hasYT) msg += `\n• YouTube: ${ytU} / ${ytP}`;
                if(hasMail) msg += `\n• Mail Invitación: ${mail}`;
            }

            msg += `\n\n📦 Envío comprobante a continuación.`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function abrirSoporte() { document.getElementById('modalSoporte').style.display = "block"; }
        function enviarSoporte() {
            const msg = `🚨 SOPORTE\nPlat: ${document.getElementById('sop-plat').value}\nUser: ${document.getElementById('sop-user').value}\nPass: ${document.getElementById('sop-pass').value}\nProb: ${document.getElementById('sop-prob').value}`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function canjearCodigo() {
            const cod = document.getElementById('input-codigo').value.trim().toUpperCase();
            const res = document.getElementById('resultado-canje');
            const c = BOVEDA_CUENTAS[cod];
            if (c) {
                const v = new Date(); v.setDate(v.getDate() + 30);
                const t = `🍿 ENTREGA ALN FLUX\n------------------\n📺 ${c.plataforma}\n📧 Correo: ${c.mail}\n🔑 Clave: ${c.pass}\n👤 Perfil: ${c.perfil}\n📌 PIN: ${c.pin}\n📅 Vence: ${v.toLocaleDateString()}\n\n${REGLAS}`;
                res.innerHTML = `<div style="background:rgba(0,229,255,0.1); border:1px solid var(--cian); padding:15px; border-radius:15px; margin-top:20px; text-align:left;">
                    <b>✅ ACCESO OK</b><br>📺 ${c.plataforma}<br>📧 ${c.mail}<br>🔑 ${c.pass}<br>👤 Perfil: ${c.perfil}<br>📌 PIN: ${c.pin}<br>📅 Vence: ${v.toLocaleDateString()}<br><br>
                    <button onclick="navigator.clipboard.writeText(\`${t.replace(/\n/g, '\\n')}\`); alert('Copiado');" class="btn-add" style="background:var(--verde)">COPIAR PARA CLIENTE</button>
                </div>`;
            } else { res.innerHTML = `<p style="color:var(--rojo)">CÓDIGO INVÁLIDO</p>`; }
        }
        render();
    </script>
</body>
</html>
