<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALN FLUX STORE | Streaming Premium</title>
    <style>
        :root {
            --morado: #6200ea; --cian: #00e5ff; --fondo: #050505;
            --tarjeta: #111111; --verde: #25d366; --rojo: #ff4444; --naranja: #ff9800; --oro: #ffd700;
            --gris-oscuro: #333;
        }
        body { margin: 0; padding: 0; background-color: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* Persiana de Tienda Cerrada */
        .tienda-bloqueada .btn-add { background: #222 !important; color: #555 !important; cursor: not-allowed !important; }
        .tienda-bloqueada .card { opacity: 0.7; filter: grayscale(0.5); }

        .status-top { width: 100%; padding: 10px 0; text-align: center; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid; position: sticky; top: 0; z-index: 3000; }
        .tienda-abierta { background: rgba(37, 211, 102, 0.1); color: var(--verde); border-color: var(--verde); backdrop-filter: blur(10px); }
        .tienda-cerrada { background: rgba(255, 68, 68, 0.2); color: var(--rojo); border-color: var(--rojo); backdrop-filter: blur(10px); }
        
        header { width: 100%; background: linear-gradient(180deg, #100020 0%, var(--fondo) 100%); padding: 40px 0; text-align: center; border-bottom: 1px solid var(--morado); }
        header h1 { margin: 0; font-size: 2.3rem; letter-spacing: 5px; text-transform: uppercase; color: white; display: inline-block;}
        header h1 span { color: var(--cian); }

        /* Sección Estrenos */
        .estrenos-section { width: 90%; max-width: 1100px; margin: 20px 0; padding: 15px; background: rgba(98, 0, 234, 0.05); border-radius: 20px; border: 1px solid #222; text-align: center; }
        .estrenos-grid { display: flex; gap: 10px; overflow-x: auto; padding: 10px; scrollbar-width: none; }
        .estreno-tag { background: var(--tarjeta); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--morado); font-size: 0.8rem; white-space: nowrap; color: var(--cian); }

        .catalogo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 95%; max-width: 1100px; padding: 30px 0; }
        .card { background: var(--tarjeta); border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #222; position: relative; }
        .precio-tag { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; display: block; color: var(--cian); }
        
        .btn-add { background: var(--morado); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        .boveda-section { width: 90%; max-width: 450px; background: #0a0a0a; border: 2px dashed var(--morado); border-radius: 25px; padding: 30px; margin: 40px auto 100px; text-align: center; }
        .boveda-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 1.2rem; margin: 15px 0; outline: none; }
        
        .cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--morado); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; border: 2px solid var(--cian); z-index: 1000; }
        .btn-soporte { position: fixed; bottom: 25px; left: 25px; background: var(--naranja); color: white; padding: 15px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; cursor: pointer; font-size: 0.8rem; }
        
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: #0a0a0a; margin: 10% auto; padding: 25px; border: 1px solid var(--morado); width: 90%; max-width: 450px; border-radius: 25px; }
        .form-datos { text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--cian); margin-top: 15px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; margin-top: 5px; }
        .btn-finalizar { display: block; background: var(--verde); color: white; padding: 16px; border-radius: 15px; font-weight: bold; margin-top: 20px; text-align: center; width: 100%; border:none; cursor:pointer; }
    </style>
</head>
<body id="body-tienda">

    <script>
        // CONFIGURACIÓN
        const TIENDA_ABIERTA = true; // CAMBIAR A false PARA APAGAR TODO
        const WHATSAPP_NRO = "5493782518960";
        const ALIAS_PAGO = "Alanpe29";

        const PRODUCTOS = [
            { id: 1,  nombre: "Combo: Disney + Canva + Amazon", precio: 5000, tipo: "mail", especial: true },
            { id: 2,  nombre: "Amazon Prime Video", precio: 2500, tipo: "directo" },
            { id: 3,  nombre: "Disney Plus", precio: 2500, tipo: "directo" },
            { id: 4,  nombre: "Max (HBO)", precio: 2000, tipo: "directo" },
            { id: 5,  nombre: "Paramount Plus", precio: 2000, tipo: "directo" },
            { id: 6,  nombre: "VIX Premium", precio: 2000, tipo: "directo" },
            { id: 7,  nombre: "Crunchyroll", precio: 2500, tipo: "directo" },
            { id: 8,  nombre: "Tidal Individual", precio: 1500, tipo: "directo" },
            { id: 9,  nombre: "Flujo TV", precio: 5500, tipo: "directo" },
            { id: 10, nombre: "YouTube Individual", precio: 2000, tipo: "full" },
            { id: 11, nombre: "YouTube Familiar", precio: 3000, tipo: "full" },
            { id: 12, nombre: "Canva Pro (1 mes)", precio: 1600, tipo: "mail" },
            { id: 13, nombre: "Canva Pro (3 meses)", precio: 3000, tipo: "mail" },
            { id: 14, nombre: "Canva Mayorista (10u)", precio: 9999, tipo: "directo" },
            { id: 15, nombre: "TV Digital N", precio: 7999, tipo: "directo" },
            { id: 16, nombre: "POWER SIGNAL", precio: 2500, tipo: "directo" }
        ];

        const BOVEDA_CUENTAS = {
            "ALN-AP722": { plataforma: "Amazon Prime Video", mail: "lomajoya1@outlook.com", pass: "Juanmaria1@", perfil: "02", pin: "00030" },
            "ALN-HB531": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "1", pin: "1111" },
            "ALN-HB010": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "2", pin: "2121" },
            "ALN-HB202": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "3", pin: "1313" },
            "ALN-HB947": { plataforma: "Hbo Max", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "4", pin: "1141" }
        };

        const REGLAS_TEXTO = `Gracias por su compra. 🚀\n\n⚠ Reglas de uso:\n1. Usar únicamente tu perfil asignado.\n2. No crear ni eliminar perfiles.\n3. Solo ingresar con 1 dispositivo.\n4. No modificar ninguna información de la cuenta.\n5. No agregar numero de celular/ni cambiar.\n\n☠️ En caso de no cumplir las reglas se le dará de baja el servicio y no habrá devolución.`;
    </script>

    <div id="status-top" class="status-top"></div>
    <header><h1>ALN <span>FLUX</span> STORE</h1></header>

    <section class="estrenos-section">
        <h4 style="margin:0 0 10px 0; font-size: 0.7rem; color: var(--morado);">🎬 PRÓXIMOS ESTRENOS</h4>
        <div class="estrenos-grid">
            <div class="estreno-tag">🍿 Joker 2 (Max)</div>
            <div class="estreno-tag">⚽ Champions League</div>
            <div class="estreno-tag">🦸 Daredevil (Disney)</div>
            <div class="estreno-tag">👊 UFC 300</div>
        </div>
    </section>
    
    <div class="catalogo-container" id="main-grid"></div>

    <section class="boveda-section">
        <h3 style="color: var(--morado); margin-top: 0;">🔒 BÓVEDA DE CLIENTES</h3>
        <input type="text" id="input-codigo" class="boveda-input" placeholder="INGRESA CÓDIGO">
        <button onclick="canjearCodigo()" class="btn-add" style="background:var(--morado) !important; color:white !important;">REVELAR ACCESO</button>
        <div id="resultado-canje"></div>
    </section>

    <div class="cart-float" id="btn-cart-main" onclick="abrirCarrito()">🛒 <span id="cart-count">0</span> PRODUCTOS</div>
    <div class="btn-soporte" onclick="abrirSoporte()">🔧 SOPORTE</div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--cian); text-align:center;">MI PEDIDO</h3>
            <div id="lista-carrito"></div>
            <div id="seccion-pago" style="display:none;">
                <div style="font-size: 1.5rem; text-align: center; margin: 15px 0;">TOTAL: <span id="total-precio" style="color:var(--cian);">$0</span></div>
                <div id="form-datos" class="form-datos"></div>
                <button onclick="enviarPedido()" class="btn-finalizar">FINALIZAR POR WHATSAPP</button>
            </div>
            <p id="carrito-vacio" style="text-align:center; color:#555;">Carrito vacío</p>
            <p onclick="cerrarTodo()" style="text-align:center; color:var(--rojo); cursor:pointer; margin-top:20px;">CERRAR</p>
        </div>
    </div>

    <script>
        let carrito = [];
        const statusDiv = document.getElementById('status-top');
        const bodyTienda = document.getElementById('body-tienda');

        if(TIENDA_ABIERTA) {
            statusDiv.className = "status-top tienda-abierta";
            statusDiv.innerText = "🟢 TIENDA ABIERTA - PEDIDOS DISPONIBLES";
        } else {
            statusDiv.className = "status-top tienda-cerrada";
            statusDiv.innerText = "🔴 TIENDA CERRADA - VOLVEMOS PRONTO";
            bodyTienda.classList.add('tienda-bloqueada');
        }

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            PRODUCTOS.forEach(p => {
                grid.innerHTML += `<div class="card">
                    <h2>${p.nombre}</h2>
                    <span class="precio-tag">$${p.precio.toLocaleString()}</span>
                    <button class="btn-add" onclick="agregarAlCarrito(${p.id})">
                        ${TIENDA_ABIERTA ? 'Añadir' : 'Cerrado'}
                    </button>
                </div>`;
            });
        }

        function agregarAlCarrito(id) {
            if(!TIENDA_ABIERTA) return;
            carrito.push(PRODUCTOS.find(x => x.id === id));
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function abrirCarrito() {
            if(!TIENDA_ABIERTA) { alert("La tienda está cerrada en este momento."); return; }
            const modal = document.getElementById('modalCarrito');
            const lista = document.getElementById('lista-carrito');
            const form = document.getElementById('form-datos');
            lista.innerHTML = ""; form.innerHTML = ""; let t = 0;
            if(carrito.length === 0) {
                document.getElementById('carrito-vacio').style.display="block";
                document.getElementById('seccion-pago').style.display="none";
            } else {
                document.getElementById('carrito-vacio').style.display="none";
                document.getElementById('seccion-pago').style.display="block";
                let hasYT = false, hasMail = false;
                carrito.forEach((p, i) => {
                    t += p.precio;
                    lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#111; padding:10px; border-radius:10px;">
                        <span>${p.nombre}</span>
                        <button onclick="carrito.splice(${i},1); abrirCarrito()" style="background:var(--rojo); border:none; color:white; border-radius:5px; padding:2px 8px;">X</button>
                    </div>`;
                    if(p.tipo === "full") hasYT = true;
                    if(p.tipo === "mail") hasMail = true;
                });
                if(hasYT) form.innerHTML += `<label>Correo YouTube:</label><input id="f-yt-user"><label>Clave YouTube:</label><input id="f-yt-pass">`;
                if(hasMail) form.innerHTML += `<label>Mail Invitación:</label><input id="f-mail">`;
                document.getElementById('total-precio').innerText = "$" + t.toLocaleString();
            }
            modal.style.display = "block";
        }

        function enviarPedido() {
            let items = ""; let total = 0;
            let hasYT = false, hasMail = false;
            carrito.forEach((p, i) => { items += `${i+1}) ${p.nombre}\n`; total += p.precio; if(p.tipo === "full") hasYT = true; if(p.tipo === "mail") hasMail = true; });
            const ytU = document.getElementById('f-yt-user')?.value;
            const ytP = document.getElementById('f-yt-pass')?.value;
            const mail = document.getElementById('f-mail')?.value;
            let msg = `Hola ALN FLUX STORE 👋\nQuiero comprar:\n\n${items}\n💰 Total: $${total.toLocaleString()}\n🔑 Alias: ${ALIAS_PAGO}\n`;
            if(hasYT || hasMail) {
                msg += `\n📩 ACTIVACIÓN:`;
                if(hasYT) msg += `\n• YT: ${ytU} / ${ytP}`;
                if(hasMail) msg += `\n• Mail: ${mail}`;
            }
            msg += `\n\n📦 Envío comprobante.`;
            window.open(`https://wa.me/${WHATSAPP_NRO}?text=${encodeURIComponent(msg)}`);
        }

        function canjearCodigo() {
            const cod = document.getElementById('input-codigo').value.trim().toUpperCase();
            const res = document.getElementById('resultado-canje');
            const c = BOVEDA_CUENTAS[cod];
            if (c) {
                const v = new Date(); v.setDate(v.getDate() + 30);
                const vencTxt = v.toLocaleDateString();
                const textCopia = `🍿 ENTREGA ALN FLUX\n------------------\n📺 Plataforma: ${c.plataforma}\n📧 Correo: ${c.mail}\n🔑 Contraseña: ${c.pass}\n👤 Perfil: ${c.perfil}\n📌 PIN: ${c.pin}\n📅 Vence: ${vencTxt}\n\n${REGLAS_TEXTO}`;
                res.innerHTML = `<div style="background:rgba(0,229,255,0.05); border:1px solid #00e5ff80; padding:15px; border-radius:15px; margin-top:20px; text-align:left;">
                    <b style="color:var(--verde);">✅ ACCESO OK</b><br>
                    📺 Plataforma: ${c.plataforma}<br>📧 Correo: ${c.mail}<br>🔑 Contraseña: ${c.pass}<br>👤 Perfil: ${c.perfil}<br>📌 PIN: ${c.pin}<br>📅 Vence: ${vencTxt}
                    <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
                    <div style="font-size:0.65rem; color:#aaa; white-space:pre-line;">${REGLAS_TEXTO}</div>
                    <button onclick="navigator.clipboard.writeText(\`${textCopia.replace(/\n/g, '\\n')}\`); alert('Copiado');" class="btn-add" style="background:var(--verde); margin-top:15px;">COPIAR DATOS</button>
                </div>`;
            } else { res.innerHTML = `<p style="color:var(--rojo); margin-top:15px;">❌ CÓDIGO INVÁLIDO</p>`; }
        }

        function cerrarTodo() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function abrirSoporte() { window.open(`https://wa.me/${WHATSAPP_NRO}?text=Hola, necesito soporte técnico.`); }
        render();
    </script>
</body>
</html>
