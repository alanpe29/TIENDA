<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALN FLUX | Bóveda de Despacho</title>
    <style>
        :root { --fondo: #0a0a0a; --tarjeta: #1a1a1a; --cian: #00e5ff; --verde: #25d366; }
        body { background: var(--fondo); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--cian); margin-bottom: 20px; }
        #buscador { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
        #buscador:focus { border-color: var(--cian); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--tarjeta); border-radius: 12px; padding: 15px; border-left: 5px solid #555; position: relative; }
        
        /* Colores por servicio */
        .disney { border-left-color: #0063e5; }
        .hbo { border-left-color: #9900ff; }
        .amazon { border-left-color: #ff9900; }
        .ps { border-left-color: #003791; }

        .info-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px; }
        .info-row span { font-size: 0.9rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
        
        .btn-copy { background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .btn-copy:active { background: var(--cian); }
        
        .btn-full { width: 100%; background: var(--verde); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 0.9rem; }
        .tag-perfil { font-size: 0.7rem; background: var(--cian); color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px;">ALN FLUX <span style="color:var(--cian)">BOVEDA</span></h2>
</div>

<input type="text" id="buscador" placeholder="🔍 Buscar cuenta o juego..." onkeyup="filtrar()">

<div class="grid" id="contenedor">
    </div>

<script>
    const CUENTAS = [
        { plataforma: "Disney Plus", clase: "disney", mail: "sofia.mendez@semflix.net", pass: "ander5066", perfil: "Perfil 1", pin: "2002", reglas: "No cambiar datos. 1 solo dispositivo." },
        { plataforma: "HBO Max", clase: "hbo", mail: "garabalsanti+max5@gmail.com", pass: "Freemium2031", perfil: "Perfil 4", pin: "1141", reglas: "Respetar perfil asignado." },
        { plataforma: "Amazon Prime", clase: "amazon", mail: "lomajoya1@outlook.com", pass: "Juanmaria1@", perfil: "Perfil 02", pin: "00030", reglas: "Uso personal, no compartir." },
        { plataforma: "Resident Evil 2 PS4", clase: "ps", mail: "re2ps4_aln@play.com", pass: "Resident88", perfil: "Primaria", pin: "N/A", reglas: "Instalar y loguear como indica el tutorial." },
        // Agregá más acá siguiendo el formato
    ];

    function cargarCuentas() {
        const cont = document.getElementById('contenedor');
        cont.innerHTML = "";
        CUENTAS.forEach((c, index) => {
            cont.innerHTML += `
                <div class="card ${c.clase}">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <strong style="color:var(--cian)">${c.plataforma}</strong>
                        <span class="tag-perfil">${c.perfil}</span>
                    </div>
                    <div class="info-row">
                        <span>${c.mail}</span>
                        <button class="btn-copy" onclick="copy('${c.mail}')">Mail</button>
                    </div>
                    <div class="info-row">
                        <span>${c.pass}</span>
                        <button class="btn-copy" onclick="copy('${c.pass}')">Pass</button>
                    </div>
                    <button class="btn-full" onclick="copyFull(${index})">COPIAR MENSAJE COMPLETO ✅</button>
                </div>
            `;
        });
    }

    function copy(texto) {
        navigator.clipboard.writeText(texto);
        // Feedback visual rápido
    }

    function copyFull(index) {
        const c = CUENTAS[index];
        const textoFull = `🍿 *TU CUENTA ALN FLUX*\n\n📺 *Servicio:* ${c.plataforma}\n📧 *Mail:* ${c.mail}\n🔑 *Pass:* ${c.pass}\n👤 *Perfil:* ${c.perfil}\n🔢 *PIN:* ${c.pin}\n\n⚠️ *Reglas:* ${c.reglas}\n\n¡Gracias por tu compra!`;
        navigator.clipboard.writeText(textoFull);
        alert("¡Mensaje completo copiado!");
    }

    function filtrar() {
        let filtro = document.getElementById('buscador').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let txt = cards[i].innerText.toLowerCase();
            cards[i].style.display = txt.includes(filtro) ? "" : "none";
        }
    }

    cargarCuentas();
</script>

</body>
</html>
